name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Build game stubs
        run: |
          GAME="/tmp/stardew/Stardew Valley"
          mkdir -p "$GAME/smapi-internal"
          touch "$GAME/Stardew Valley"

          dotnet build .github/stubs/Xna/Xna.csproj -o /tmp/stubout -v q
          dotnet build .github/stubs/GameData/GameData.csproj -o /tmp/stubout -v q
          dotnet build .github/stubs/Game/Game.csproj -o /tmp/stubout -v q
          dotnet build .github/stubs/Smapi/Smapi.csproj -o /tmp/stubout -v q

          cp /tmp/stubout/StardewModdingAPI.dll "$GAME/StardewModdingAPI.dll"
          cp /tmp/stubout/StardewModdingAPI.dll "$GAME/smapi-internal/StardewModdingAPI.dll"
          cp "/tmp/stubout/Stardew Valley.dll" "$GAME/Stardew Valley.dll"
          cp /tmp/stubout/StardewValley.GameData.dll "$GAME/StardewValley.GameData.dll"
          cp /tmp/stubout/MonoGame.Framework.dll "$GAME/MonoGame.Framework.dll"

      - name: Restore
        run: dotnet restore LaCompta/LaCompta.csproj
        env:
          GamePath: /tmp/stardew/Stardew Valley

      - name: Build Release
        run: dotnet build LaCompta/LaCompta.csproj --configuration Release --no-restore /p:EnableModDeploy=false /p:EnableModZip=false
        env:
          GamePath: /tmp/stardew/Stardew Valley

      - name: Package mod
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          MOD_DIR="release/LaCompta"
          mkdir -p "$MOD_DIR/Assets"

          cp LaCompta/bin/Release/net6.0/LaCompta.dll "$MOD_DIR/"
          cp LaCompta/manifest.json "$MOD_DIR/"

          for dll in LaCompta/bin/Release/net6.0/*.dll; do
            name=$(basename "$dll")
            case "$name" in
              LaCompta.dll|Stubs.dll|StardewValley*|StardewModdingAPI*|SMAPI*|MonoGame*|xna*) continue ;;
              *) cp "$dll" "$MOD_DIR/" ;;
            esac
          done

          # Copy native SQLite binaries for all platforms from NuGet cache
          SQLITE_PKG=$(find ~/.nuget/packages/sqlitepclraw.lib.e_sqlite3 -maxdepth 1 -type d | sort -V | tail -1)
          if [ -n "$SQLITE_PKG" ]; then
            cp "$SQLITE_PKG/runtimes/win-x64/native/e_sqlite3.dll" "$MOD_DIR/" 2>/dev/null || true
            cp "$SQLITE_PKG/runtimes/linux-x64/native/libe_sqlite3.so" "$MOD_DIR/" 2>/dev/null || true
            cp "$SQLITE_PKG/runtimes/osx-x64/native/libe_sqlite3.dylib" "$MOD_DIR/" 2>/dev/null || true
          fi

          cp -r LaCompta/bin/Release/net6.0/Web/Assets/* "$MOD_DIR/Assets/" 2>/dev/null || true

          cd release
          zip -r "../LaCompta-${VERSION}.zip" LaCompta/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LaCompta-*.zip
          generate_release_notes: true

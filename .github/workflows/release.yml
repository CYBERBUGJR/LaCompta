name: Release

# Release artifacts (the .zip) are built LOCALLY by the maintainer against the
# real Stardew Valley DLLs, not by CI. CI stubs are minimal and produce IL
# that references types/namespaces missing from real game/SMAPI assemblies,
# which causes SMAPI to reject the mod with "no longer compatible".
#
# This workflow only creates the GitHub Release shell (page + auto-generated
# notes) when a v* tag is pushed. The maintainer attaches the locally-built
# zip via `gh release upload` or the GitHub web UI.
#
# See docs/RELEASING.md for the full release procedure.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release shell (notes only — assets uploaded by maintainer)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          body: |
            > **Release artifact pending.** The maintainer will attach `LaCompta-${{ github.ref_name }}.zip` shortly.
            >
            > The mod zip is built locally against the real Stardew Valley DLLs
            > (see `docs/RELEASING.md`) — CI does not produce release artifacts.

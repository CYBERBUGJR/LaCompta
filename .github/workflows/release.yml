name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Build game stubs
        run: |
          GAME="/tmp/stardew/Stardew Valley"
          mkdir -p "$GAME/smapi-internal"
          touch "$GAME/Stardew Valley"

          dotnet build .github/stubs/Xna/Xna.csproj -o /tmp/stubout -v q
          dotnet build .github/stubs/GameData/GameData.csproj -o /tmp/stubout -v q
          dotnet build .github/stubs/Game/Game.csproj -o /tmp/stubout -v q
          dotnet build .github/stubs/Smapi/Smapi.csproj -o /tmp/stubout -v q

          cp /tmp/stubout/StardewModdingAPI.dll "$GAME/StardewModdingAPI.dll"
          cp /tmp/stubout/StardewModdingAPI.dll "$GAME/smapi-internal/StardewModdingAPI.dll"
          cp "/tmp/stubout/Stardew Valley.dll" "$GAME/Stardew Valley.dll"
          cp /tmp/stubout/StardewValley.GameData.dll "$GAME/StardewValley.GameData.dll"
          cp /tmp/stubout/MonoGame.Framework.dll "$GAME/MonoGame.Framework.dll"

      - name: Restore
        run: dotnet restore LaCompta/LaCompta.csproj
        env:
          GamePath: /tmp/stardew/Stardew Valley

      - name: Prepare deploy folder
        run: mkdir -p "/tmp/stardew/Stardew Valley/Mods"

      - name: Build & package (ModBuildConfig produces the zip)
        run: dotnet build LaCompta/LaCompta.csproj --configuration Release --no-restore
        env:
          GamePath: /tmp/stardew/Stardew Valley

      - name: Locate and rename release zip
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          ZIP=$(find LaCompta/bin/Release -maxdepth 4 -name '*.zip' | head -n1)
          if [ -z "$ZIP" ]; then
            echo "::error::ModBuildConfig did not produce a zip" >&2
            find LaCompta/bin -type f | head -200 >&2
            exit 1
          fi
          cp "$ZIP" "LaCompta-${VERSION}.zip"
          echo "Packaged: $ZIP -> LaCompta-${VERSION}.zip"
          unzip -l "LaCompta-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LaCompta-*.zip
          generate_release_notes: true

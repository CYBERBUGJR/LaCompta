name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Build game stubs
        run: |
          GAME="/tmp/stardew/Stardew Valley"
          mkdir -p "$GAME/smapi-internal"
          touch "$GAME/Stardew Valley"

          dotnet build .github/stubs/Stubs.csproj -o /tmp/stubout -v q
          cp /tmp/stubout/Stubs.dll "$GAME/StardewModdingAPI.dll"
          cp /tmp/stubout/Stubs.dll "$GAME/Stardew Valley.dll"
          cp /tmp/stubout/Stubs.dll "$GAME/smapi-internal/StardewModdingAPI.dll"

      - name: Restore
        run: dotnet restore LaCompta/LaCompta.csproj
        env:
          GamePath: /tmp/stardew/Stardew Valley

      - name: Build Release
        run: dotnet build LaCompta/LaCompta.csproj --configuration Release --no-restore /p:EnableModDeploy=false /p:EnableModZip=false
        env:
          GamePath: /tmp/stardew/Stardew Valley

      - name: Package mod
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          MOD_DIR="release/LaCompta"
          mkdir -p "$MOD_DIR/Assets"

          cp LaCompta/bin/Release/net6.0/LaCompta.dll "$MOD_DIR/"
          cp LaCompta/manifest.json "$MOD_DIR/"

          for dll in LaCompta/bin/Release/net6.0/*.dll; do
            name=$(basename "$dll")
            case "$name" in
              LaCompta.dll|Stubs.dll|StardewValley*|SMAPI*|MonoGame*|xna*) continue ;;
              *) cp "$dll" "$MOD_DIR/" ;;
            esac
          done

          cp -r LaCompta/bin/Release/net6.0/Web/Assets/* "$MOD_DIR/Assets/" 2>/dev/null || true

          cd release
          zip -r "../LaCompta-${VERSION}.zip" LaCompta/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LaCompta-*.zip
          generate_release_notes: true
